<div class="login-page">
  <div class="login-left">
    <div class="brand">
      <span class="brand-icon">👥</span>
      <h1>EmpManager</h1>
    </div>
    <p class="brand-desc">Manage your team efficiently and professionally</p>
    <div class="features">
      <div class="feature">✅ Employee Management</div>
      <div class="feature">📊 Dashboard Analytics</div>
      <div class="feature">⚙️ Easy Settings</div>
      <div class="feature">🖐️ Fingerprint Support</div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">👥</div>
        <h2>Welcome Back</h2>
        <p>Sign in to your admin account</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="admin@company.com"
            (keyup.enter)="login()"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="••••••••"
            (keyup.enter)="login()"
          />
          <span class="toggle-pass" (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </span>
        </div>
      </div>

      <div class="error-msg" *ngIf="errorMsg">
        ❌ {{ errorMsg }}
      </div>

      <button class="btn-login" (click)="login()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In →</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>
    </div>
  </div>
</div>
